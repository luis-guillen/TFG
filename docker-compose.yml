services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"

# Ollama: usar binario nativo en macOS para Metal GPU acceleration
# brew install ollama && make ollama-setup

volumes:
  qdrant_storage:
