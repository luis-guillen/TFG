sources:
  # === Fuente piloto (activa) ===
  - id: memoria_lanzarote
    name: "Memoria de Lanzarote"
    base_url: "https://memoriadelanzarote.com/"
    connector: "connectors.memoria_lanzarote.MemoriaLanzaroteConnector"
    content_selectors:
      - "article"
      - ".entry-content"
      - ".item-content"
      - ".document-text"
    discovery: "pagination"
    island: "Lanzarote"
    status: active
    extra:
      documents_url: "https://memoriadelanzarote.com/documentos"
      items_per_page: 12

